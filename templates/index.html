<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
        }
        .sentiment-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 2rem;
        }
        .gauge-container {
            position: relative;
            width: 200px;
            height: 100px;
            margin: 2rem auto;
            overflow: hidden;
        }
        .gauge {
            width: 100%;
            height: 200px;
            border-radius: 100px 100px 0 0;
            background: linear-gradient(90deg, 
                #ff4444 0%, 
                #ffbb33 50%, 
                #00C851 100%
            );
            position: relative;
        }
        .gauge-needle {
            position: absolute;
            width: 4px;
            height: 100px;
            background: #333;
            left: 50%;
            bottom: 0;
            transform-origin: bottom;
            transform: rotate(0deg);
            transition: transform 1s ease-out;
        }
        .result-emoji {
            font-size: 3rem;
            margin: 1rem 0;
        }
        .score-label {
            font-size: 1.5rem;
            margin: 1rem 0;
            font-weight: bold;
        }
        #loadingSpinner {
            display: none;
        }
        .probabilities-container {
            margin-top: 1rem;
        }
        .probability-bar {
            height: 24px;
            transition: width 1s ease-out;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="sentiment-card">
            <h1 class="text-center mb-4">Sentiment Analysis</h1>
            
            <div class="form-group">
                <textarea 
                    class="form-control mb-3" 
                    id="textInput" 
                    rows="4" 
                    placeholder="Enter your text here..."
                ></textarea>
                <div class="text-center">
                    <button class="btn btn-primary" onclick="analyzeSentiment()">
                        <span class="spinner-border spinner-border-sm" id="loadingSpinner" role="status" aria-hidden="true"></span>
                        Analyze
                    </button>
                </div>
            </div>

            <div id="results" style="display: none;">
                <div class="gauge-container">
                    <div class="gauge"></div>
                    <div class="gauge-needle"></div>
                </div>
                
                <div class="text-center">
                    <div class="result-emoji" id="resultEmoji"></div>
                    <div class="score-label" id="scoreLabel"></div>
                </div>

                <div class="probabilities-container">
                    <h5 class="text-center mb-3">Sentiment Probabilities</h5>
                    <div id="probabilitiesBars"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeSentiment() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('Please enter some text to analyze');
                return;
            }

            // Show loading state
            const button = document.querySelector('button');
            const spinner = document.getElementById('loadingSpinner');
            button.disabled = true;
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    alert(data.error || 'An error occurred');
                }
            } catch (error) {
                alert('Failed to analyze text');
            } finally {
                // Hide loading state
                button.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function displayResults(data) {
            // Show results container
            document.getElementById('results').style.display = 'block';
            
            // Update emoji and score
            document.getElementById('resultEmoji').textContent = data.emoji;
            document.getElementById('scoreLabel').textContent = 
                `${data.category} (Score: ${data.score}/5)`;
            document.getElementById('scoreLabel').style.color = data.color;
            
            // Update gauge needle
            const angle = -90 + (data.score - 1) * 45;  // -90 to 90 degrees
            document.querySelector('.gauge-needle').style.transform = 
                `rotate(${angle}deg)`;

            // Update probability bars
            const barsHtml = Object.entries(data.probabilities)
                .map(([score, prob]) => `
                    <div class="mb-2">
                        <div class="d-flex justify-content-between mb-1">
                            <small>Score ${score}</small>
                            <small>${(prob * 100).toFixed(1)}%</small>
                        </div>
                        <div class="progress">
                            <div class="progress-bar probability-bar" 
                                role="progressbar" 
                                style="width: ${prob * 100}%"
                                aria-valuenow="${prob * 100}" 
                                aria-valuemin="0" 
                                aria-valuemax="100">
                            </div>
                        </div>
                    </div>
                `).join('');
            
            document.getElementById('probabilitiesBars').innerHTML = barsHtml;
        }

        // Allow Enter key to submit
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                analyzeSentiment();
            }
        });
    </script>
</body>
</html>
